# yamllint disable rule:empty-lines
openapi: 3.0.0

info:
  title: Coopera API
  version: 0.0.1
  description: >
    Coopera is a routine task tracker for teams. The system records events (who did what and
    when) and does not resolve conflicts within a team.

servers:
  - url: http://localhost:8080/v1
    description: Local development

tags:
  - name: teams
    description: Teams
  - name: invite-links
    description: Invite links

paths:
  /teams:
    post:
      operationId: createTeam
      tags: [ teams ]
      summary: Create a team
      description: >
        Creates a team and makes the caller its owner.
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'

      responses:
        '201':
          description: Team created
          headers:
            Location:
              description: URL of the created team
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [ teams ]
      summary: Get a team
      description: >
        Returns a team by its id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Team found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Team not found, or the caller is not a member
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /users/me/teams:
    get:
      operationId: listMyTeams
      tags: [ teams ]
      summary: List the caller's teams
      description: >
        Returns teams where the caller has an active membership.
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Caller's teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'

        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /teams/{team_id}/invite-links:
    post:
      operationId: createInviteLink
      tags: [ invite-links ]
      summary: Create an invite link
      description: >
        Creates a link that can be used to join the team. Only the team's owner may create one.
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInviteLinkRequest'
      responses:
        '201':
          description: Invite link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteLink'

        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '403':
          description: The caller is not the team's owner
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Team not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

    get:
      operationId: listInviteLinks
      tags: [ invite-links ]
      summary: List the team's invite links
      description: >
        Returns invite links for the team, optionally filtered by status. Only the team's owner
        may list them.
      parameters:
        - name: team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [ active, expired, revoked ]
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Invite links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InviteLink'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '403':
          description: The caller is not the team's owner
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Team not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /invite-links/{code}:
    delete:
      operationId: revokeInviteLink
      tags: [ invite-links ]
      summary: Revoke an invite link
      description: >
        Marks the invite link as revoked. Only the owner of the team it belongs to may revoke it.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XUserId'
      responses:
        '204':
          description: Invite link revoked

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '403':
          description: The caller is not the owner of the link's team
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Invite link not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /invite-links/{code}/accept:
    post:
      operationId: acceptInviteLink
      tags: [ invite-links ]
      summary: Join a team via an invite link
      description: >
        Adds the caller as a member of the team the invite link belongs to.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/XUserId'
      responses:
        '201':
          description: Joined the team
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Invite link not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '410':
          description: The invite link has expired or been revoked
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  parameters:
    XUserId:
      name: X-User-Id
      in: header
      required: true
      description: >
        Temporary placeholder until real authentication exists. Identifies the caller.
      schema:
        type: string
        format: uuid

  schemas:
    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          $ref: "#/components/schemas/TeamName"
        created_at:
          type: string
          format: date-time
      required: [ id, name, created_at ]

    CreateTeamRequest:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TeamName"
      required: [ name ]

    TeamName:
      type: string
      minLength: 1
      maxLength: 100

    CreateInviteLinkRequest:
      type: object
      properties:
        expires_at:
          type: string
          format: date-time
      description: >
        Omitting expires_at creates a link that never expires.

    InviteLink:
      type: object
      properties:
        code:
          type: string
        use_count:
          type: integer
        created_at:
          type: string
          format: date-time
        state:
          $ref: '#/components/schemas/InviteLinkState'
      required: [ code, use_count, created_at, state ]

    InviteLinkState:
      oneOf:
        - $ref: '#/components/schemas/ActiveInviteLinkState'
        - $ref: '#/components/schemas/ExpiredInviteLinkState'
        - $ref: '#/components/schemas/RevokedInviteLinkState'
      discriminator:
        propertyName: status
        mapping:
          active: '#/components/schemas/ActiveInviteLinkState'
          expired: '#/components/schemas/ExpiredInviteLinkState'
          revoked: '#/components/schemas/RevokedInviteLinkState'

    ActiveInviteLinkState:
      type: object
      properties:
        status:
          type: string
          enum: [ active ]
        expires_at:
          type: string
          format: date-time
          nullable: true
      required: [ status, expires_at ]

    ExpiredInviteLinkState:
      type: object
      properties:
        status:
          type: string
          enum: [ expired ]
        expired_at:
          type: string
          format: date-time
      required: [ status, expired_at ]

    RevokedInviteLinkState:
      type: object
      properties:
        status:
          type: string
          enum: [ revoked ]
        revoked_at:
          type: string
          format: date-time
      required: [ status, revoked_at ]

    Problem:
      description: >
        RFC 9457 Problem Details for HTTP APIs.
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
      required: [ title, status ]
