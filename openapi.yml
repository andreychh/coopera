# yamllint disable rule:empty-lines
openapi: 3.0.0

info:
  title: Coopera API
  version: 0.0.1
  description: >
    Coopera is a routine task tracker for teams. The system records events (who did what and
    when) and does not resolve conflicts within a team.

servers:
  - url: http://localhost:8080/v1
    description: Local development

tags:
  - name: teams
    description: Teams

paths:
  /teams:
    post:
      operationId: createTeam
      tags: [ teams ]
      summary: Create a team
      description: >
        Creates a team and makes the caller its owner.
      parameters:
        - $ref: '#/components/parameters/XUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'

      responses:
        '201':
          description: Team created
          headers:
            Location:
              description: URL of the created team
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /teams/{id}:
    get:
      operationId: getTeam
      tags: [ teams ]
      summary: Get a team
      description: >
        Returns a team by its id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Team found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Team'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '404':
          description: Team not found, or the caller is not a member
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /users/me/teams:
    get:
      operationId: listMyTeams
      tags: [ teams ]
      summary: List the caller's teams
      description: >
        Returns teams where the caller has an active membership.
      parameters:
        - $ref: '#/components/parameters/XUserId'
      responses:
        '200':
          description: Caller's teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Team'

        '400':
          description: Invalid request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '401':
          description: The caller could not be identified
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

        '500':
          description: Internal server error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  parameters:
    XUserId:
      name: X-User-Id
      in: header
      required: true
      description: >
        Temporary placeholder until real authentication exists. Identifies the caller.
      schema:
        type: string
        format: uuid

  schemas:
    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          $ref: "#/components/schemas/TeamName"
        created_at:
          type: string
          format: date-time
          readOnly: true
      required: [ id, name, created_at ]

    CreateTeamRequest:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/TeamName"
      required: [ name ]

    TeamName:
      type: string
      minLength: 1
      maxLength: 100

    Problem:
      description: >
        RFC 9457 Problem Details for HTTP APIs.
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
      required: [ title, status ]
