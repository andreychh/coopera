"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"
"npm:markdownlint-cli2" = "0.22.1"
"npm:renovate" = "43.249.1"
"pipx:reuse" = "6.2.0"
"pipx:yamllint" = "1.38.0"

# indirect
"node" = "24.18.0"
"aqua:koalaman/shellcheck" = "0.11.0"

[env]
_.file = ".env"
