legacy_version_file = false

[tools]
"go" = "1.26.4"
"aqua:caarlos0/svu" = "3.4.0"
"aqua:crate-ci/typos" = "1.47.2"
"aqua:golangci/golangci-lint" = "2.12.2"
"aqua:goreleaser/goreleaser" = "2.16.0"
"aqua:go-task/task" = "3.51.1"
"aqua:rhysd/actionlint" = "1.7.12"
